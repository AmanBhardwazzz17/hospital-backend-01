<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Login</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f0f2f5;
}

.container {
  display: flex;
  width: 900px;
  height: 550px;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.left {
  width: 50%;
  background: url('https://images.unsplash.com/photo-1604079628040-94301bb21b91') no-repeat center;
  background-size: cover;
  position: relative;
  color: white;
}

.left::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.left-content {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.left-content h3 {
  font-size: 18px;
}

/* RIGHT SIDE */
.right {
  width: 50%;
  padding: 40px;
}

.logo {
  font-weight: bold;
  margin-bottom: 30px;
}

.right h1 {
  margin-bottom: 10px;
}

.right p {
  margin-bottom: 20px;
  color: gray;
}

.input-box {
  margin: 10px 0;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: #ff4b2b;
  color: white;
  border: none;
  border-radius: 25px;
  margin-top: 20px;
  cursor: pointer;
}

.login-btn:hover {
  background: #08d819;
}

.google-btn {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 25px;
  background: white;
  cursor: pointer;
}

.footer {
  margin-top: 20px;
  font-size: 14px;
  text-align: center;
}

.footer a {
  color: #0ae62e;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="left-content">
      <h3>Andrew.u</h3>
      <p>UI & Illustration</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="logo">UISOCIAL</div>

    <h1>Hi Designer</h1>
    <p>Welcome to UISOCIAL</p>

    <form id="loginForm">
      <div class="input-box">
        <input type="email" id="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <button type="button" class="google-btn">
        Login with Google
      </button>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="#">Sign up</a>
    </div>

  </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("http://localhost:3000/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      alert("Login Successful ✅");
      localStorage.setItem("token", data.token);
    } else {
      alert("Login Failed ❌");
    }

  } catch (err) {
    alert("Server Error ❌");
  }
});
</script>

</body>
</html>
