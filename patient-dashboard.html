<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f7fb;
}

.header {
  padding: 15px;
  background: #2563eb;
  color: white;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Map */
#map {
  height: 300px;
  border-radius: 10px;
}

/* Beds */
.bed {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.bar {
  height: 8px;
  background: #e5e7eb;
  border-radius: 5px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: #22c55e;
}

/* Emergency */
.emergency {
  background: red;
  color: white;
  padding: 15px;
  border: none;
  width: 100%;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* SMS */
.sms input {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
}

.sms button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">
  Patient Dashboard
</div>

<div class="container">

  <!-- MAP -->
  <div class="card">
    <h3>Nearby Hospitals</h3>
    <div id="map"></div>
  </div>

  <!-- RIGHT SIDE -->
  <div>

    <!-- BED STATUS -->
    <div class="card">
      <h3>Bed Availability</h3>

      <div class="bed">
        ICU <span>6/10</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:60%"></div></div>

      <div class="bed">
        General <span>20/30</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:70%"></div></div>

    </div>

    <!-- EMERGENCY -->
    <div class="card">
      <button class="emergency" onclick="sendEmergency()">🚨 Emergency Request</button>
    </div>

    <!-- SMS ALERT -->
    <div class="card sms">
      <h3>Send SMS Alert</h3>
      <input type="text" id="phone" placeholder="Enter phone number">
      <button onclick="sendSMS()">Send Alert</button>
    </div>

  </div>

</div>

<!-- ANALYTICS -->
<div style="padding:20px;">
  <div class="card">
    <h3>Peak Emergency Hours</h3>
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- GOOGLE MAP -->
<script>
function initMap() {
  const location = { lat: 26.1445, lng: 91.7362 }; // Guwahati

  const map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: location,
  });

  new google.maps.Marker({
    position: location,
    map,
    title: "Nearby Hospital"
  });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

<!-- CHART -->
<script>
new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: ["6AM","9AM","12PM","3PM","6PM","9PM"],
    datasets: [{
      label: "Emergency Cases",
      data: [5, 12, 20, 15, 25, 18],
      borderWidth: 2
    }]
  }
});
</script>

<!-- FUNCTIONS -->
<script>
function sendEmergency() {
  alert("🚑 Emergency Request Sent!");
}

function sendSMS() {
  const phone = document.getElementById("phone").value;
  alert("SMS sent to " + phone);

  // Backend API yaha connect karega (Twilio etc.)
}
</script>

</body>
</html>
