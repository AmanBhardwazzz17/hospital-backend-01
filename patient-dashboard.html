<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Bed Availability – HospTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f0f4ff;
  --white: #ffffff;
  --accent: #009688;
  --accent2: #3b82f6;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e8edf5;
  --font: 'Plus Jakarta Sans', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg)}

.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px;background:white;border-bottom:1px solid #eee
}
.logo{font-weight:800}
.content{padding:20px}

.summary-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px
}
.summary-card{
  background:white;padding:15px;border-radius:10px;text-align:center
}

.map-section{background:white;border-radius:10px;margin-bottom:20px}
#map{height:300px}

.hospitals-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px
}
.hospital-card{
  background:white;padding:15px;border-radius:10px
}

button{cursor:pointer}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🏥 HospTrack</div>
  <button onclick="loadBeds()">Refresh</button>
</div>

<div class="content">

<h2>🛏️ Live Bed Availability</h2>

<div class="summary-grid">
  <div class="summary-card"><div id="totalHospitals">0</div>Total Hospitals</div>
  <div class="summary-card"><div id="totalBeds">0</div>Total Beds</div>
  <div class="summary-card"><div id="availableBeds">0</div>Available Beds</div>
  <div class="summary-card"><div id="availableICU">0</div>ICU Beds</div>
</div>

<div class="map-section">
  <div id="map"></div>
</div>

<div id="hospitalsGrid" class="hospitals-grid"></div>

</div>

<script>
const API_URL = "https://hospital-backend-01.onrender.com";

let hospitals = [];
let map;
let markers=[];

function initMap(){
  map=new google.maps.Map(document.getElementById("map"),{
    center:{lat:28.61,lng:77.20},
    zoom:5
  });
}

async function loadBeds(){
  try{
    const res=await fetch(API_URL+"/api/hospitals");
    const data=await res.json();

    if(data.success){
      hospitals=data.data;
    }else{
      demoData();
    }
  }catch{
    demoData();
  }

  render();
}

function demoData(){
  hospitals=[
    {name:"City Hospital",city:"Mumbai",availableBeds:50,totalBeds:200,icuAvailable:10,lat:19.07,lng:72.87},
    {name:"Apollo",city:"Delhi",availableBeds:20,totalBeds:150,icuAvailable:5,lat:28.61,lng:77.20}
  ];
}

function render(){
  document.getElementById("totalHospitals").innerText=hospitals.length;

  let totalBeds=0,availableBeds=0,icu=0;

  hospitals.forEach(h=>{
    totalBeds+=h.totalBeds||0;
    availableBeds+=h.availableBeds||0;
    icu+=h.icuAvailable||0;
  });

  document.getElementById("totalBeds").innerText=totalBeds;
  document.getElementById("availableBeds").innerText=availableBeds;
  document.getElementById("availableICU").innerText=icu;

  renderCards();
  renderMap();
}

function renderCards(){
  const grid=document.getElementById("hospitalsGrid");
  grid.innerHTML="";

  hospitals.forEach(h=>{
    const card=document.createElement("div");
    card.className="hospital-card";
    card.innerHTML=`
      <h3>${h.name}</h3>
      <p>${h.city}</p>
      <p>🛏️ ${h.availableBeds}/${h.totalBeds}</p>
      <p>🏥 ICU: ${h.icuAvailable}</p>
    `;
    grid.appendChild(card);
  });
}

function renderMap(){
  if(!map)return;

  markers.forEach(m=>m.setMap(null));
  markers=[];

  hospitals.forEach(h=>{
    if(!h.lat)return;

    const marker=new google.maps.Marker({
      position:{lat:h.lat,lng:h.lng},
      map,
      title:h.name
    });

    markers.push(marker);
  });
}

loadBeds();
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap">
</script>

</body>
</html>
